name: test-stage-2

on:
  push:
    branches: ["**"]

jobs:
  stage-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run Stage 2 tests
        run: mvn test -Dtest=Stage2Test -B
